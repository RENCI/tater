# Default values for tater.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: containers.renci.org/clin-ann/tater
  pullPolicy: Always
  # Empty string uses Chart.appVersion; override with --set image.tag=<version>
  tag: ""

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsUser: 10001
  runAsNonRoot: true
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8050

env: []
  # Additional environment variables for the tater container
  # Example:
  # - name: CUSTOM_VAR
  #   value: "custom-value"

ingress:
  enabled: true
  className: ""
  annotations:
    # cert-manager.io/cluster-issuer: letsencrypt
    cert-manager.io/cluster-issuer: zerossl
    # nginx.ingress.kubernetes.io/whitelist-source-range: "0.0.0.0/0,::/0"
  hosts:
    - host: tater.apps.renci.org
      paths:
        - path: /
          pathType: Prefix
  tls:
   - secretName: tater.apps.renci.org-tls
     hosts:
       - tater.apps.renci.org

  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
